{{define "base"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{template "title" .}} | Festival Music</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <script src="https://unpkg.com/htmx.org@1.9.10" integrity="sha384-D1Kt99CQMDuVetoL1lrYwg5t+9QdHe7NLX/SoJYkXDFfX37iInKRy5xLSi8nO7UC" crossorigin="anonymous"></script>
</head>
<body hx-headers='{"X-Requested-With": "XMLHttpRequest"}'>
    <!-- Loading Overlay for HTMX requests -->
    <div id="loading-indicator" class="loading-overlay htmx-indicator">
        <div class="vinyl-record spinning" style="width: 100px; height: 100px;"></div>
    </div>

    <header class="header-band">
        <div class="container header-grid">
            <div class="vinyl-logo-container">
                <div class="vinyl-record"></div>
                <div class="brand-text">
                    <h1><a href="/" style="color: inherit; text-decoration: none;">Festival Music</a></h1>
                    <p>Assemble the band • Sign up to play</p>
                </div>
            </div>
            <div>
                {{block "header-action" .}}
                <a href="/suggest" class="btn btn-primary">Suggest a Song</a>
                {{end}}
            </div>
        </div>
    </header>

    <main class="container" style="margin-top: 3rem;">
        {{template "content" .}}
    </main>
</body>
</html>
{{end}}
