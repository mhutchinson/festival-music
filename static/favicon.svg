<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Vinyl record body (charcoal #1C1B19) -->
  <circle cx="50" cy="50" r="46" fill="#1C1B19" />
  
  <!-- Grooves (subtle contrast rings) -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="#2E2B26" stroke-width="1" />
  <circle cx="50" cy="50" r="30" fill="none" stroke="#2E2B26" stroke-width="1" />
  <circle cx="50" cy="50" r="22" fill="none" stroke="#2E2B26" stroke-width="1" />
  
  <!-- Record center label (rust red #D25A3C) -->
  <circle cx="50" cy="50" r="16" fill="#D25A3C" />
  
  <!-- Spindle hole (cream background #F4EAD4) -->
  <circle cx="50" cy="50" r="4" fill="#F4EAD4" />
</svg>
