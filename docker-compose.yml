version: '3.8'

services:
  app:
    image: ghcr.io/mhutchinson/festival-music:latest
    container_name: festival-music-app
    ports:
      # Map host port 80 (HTTP) to container port 8080 (Go app)
      - "80:8080"
    environment:
      - SPREADSHEET_ID=${SPREADSHEET_ID}
      # Path to the credentials file within the container
      - GOOGLE_APPLICATION_CREDENTIALS=/app/credentials.json
    volumes:
      # Mount your GCP Service Account JSON key from the host VM
      - ./credentials.json:/app/credentials.json:ro
    restart: always

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount VM docker config to allow Watchtower to pull from your private registry (if applicable)
      - ~/.docker/config.json:/config.json:ro
    command: --interval 300 --cleanup --label-enable
    # Add label to the app container to tell Watchtower to monitor it
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    restart: unless-stopped
